upstream stock_market {
    server app1:8080;
    server app2:8080;
    server app3:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://stock_market;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Don't fail the whole request if one upstream dies (e.g. /chaos)
        proxy_next_upstream error timeout http_500;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}
